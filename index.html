<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Disaster Command Center (Online)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; margin: 0; padding: 0; background-color: #0f172a; color: #fff; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* ธีม High-Tech สำหรับแผงควบคุม */
        .toolbar { 
            z-index: 1000; 
            max-height: 90vh; 
            overflow-y: auto; 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(10px);
            border: 1px solid #06b6d4; 
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }
        
        /* สไตล์หมุดและ Popup เรืองแสง */
        .custom-marker { filter: drop-shadow(0 0 10px #06b6d4); cursor: pointer; }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background-color: #1e293b !important;
            color: #22d3ee !important;
            border: 1px solid #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
        }
        .leaflet-container .leaflet-control-layers {
            background: rgba(15, 23, 42, 0.9); border: 1px solid #06b6d4; color: #fff;
        }
        
        /* ปุ่มสวยงาม */
        .btn-neon {
            background: rgba(6, 182, 212, 0.1); border: 1px solid #06b6d4; color: #22d3ee;
            transition: all 0.3s;
        }
        .btn-neon:hover { background: #06b6d4; color: #0f172a; box-shadow: 0 0 15px #06b6d4; }
    </style>
</head>
<body class="relative">

    <div class="toolbar absolute top-4 left-1/2 transform -translate-x-1/2 p-4 rounded-xl w-11/12 md:w-auto flex flex-col gap-3 justify-center">
        <div class="flex items-center justify-between w-full border-b border-cyan-500/50 pb-2">
            <h1 class="text-sm md:text-base font-semibold text-cyan-400 tracking-wider">🌐 COMMAND CENTER <span class="text-xs text-green-400 animate-pulse">● ONLINE</span></h1>
        </div>
        
        <div class="w-full flex justify-center gap-2 flex-wrap">
            <button onclick="window.addMarker('👮‍♂️', 'กำลังพล')" class="btn-neon px-3 py-1.5 rounded text-sm">👮‍♂️ กำลังพล</button>
            <button onclick="window.addMarker('🚒', 'รถดับเพลิง')" class="btn-neon px-3 py-1.5 rounded text-sm">🚒 ดับเพลิง</button>
            <button onclick="window.addMarker('🚜', 'เครื่องจักร')" class="btn-neon px-3 py-1.5 rounded text-sm">🚜 เครื่องจักร</button>
            <button onclick="window.addMarker('☣️', 'จุดอันตราย')" class="btn-neon px-3 py-1.5 rounded text-sm">☣️ จุดอันตราย</button>
        </div>

        <div class="w-full mt-1">
            <button onclick="window.reportLocation()" class="w-full px-3 py-2 bg-green-600/20 border border-green-500 text-green-400 rounded-lg text-sm shadow-[0_0_10px_rgba(34,197,94,0.3)] hover:bg-green-500 hover:text-white transition">
                📡 รายงานพิกัดภาคสนาม (GPS)
            </button>
        </div>
    </div>

    <div id="map"></div>

    <script type="module">
        // 1. นำเข้า Firebase SDK [cite: 1, 2]
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

        // คอนฟิก Firebase จากไฟล์ของคุณ [cite: 2, 3]
        const firebaseConfig = {
            apiKey: "AIzaSyCJ-E8bN9nz_BWKTNofz7ccuVoo6m8LyAU",
            authDomain: "suchart-915bd.firebaseapp.com",
            databaseURL: "https://suchart-915bd-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchart-915bd",
            storageBucket: "suchart-915bd.firebasestorage.app",
            messagingSenderId: "94380768305",
            appId: "1:94380768305:web:974c9b41513cc9d261a910",
            measurementId: "G-ZQP1BYKZJC"
        };

        // เริ่มต้น Firebase [cite: 3]
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);

        // 2. ตั้งค่าแผนที่และชั้นข้อมูล (Layers)
        const map = L.map('map', { zoomControl: false }).setView([13.7563, 100.5018], 6);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // ตัวเลือกแผนที่ 3 รูปแบบ
        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19, attribution: '© CARTO' }).addTo(map); // ธีมตั้งต้น
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: '© Esri' });
        const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OSM' });

        const baseMaps = {
            "แผนที่ยุทธการ (Dark)": darkLayer,
            "ภาพถ่ายดาวเทียม (Satellite)": satelliteLayer,
            "แผนที่ถนน (OSM)": streetLayer
        };
        L.control.layers(baseMaps, null, { position: 'bottomleft' }).addTo(map);

        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        // 3. ตั้งค่า Geoman สำหรับวาดพื้นที่และเส้นอิสระ (Polyline/Polygon)
        map.pm.addControls({ 
            position: 'topleft', 
            drawCircle: false, drawCircleMarker: false, 
            drawText: false,
            drawPolyline: true, // เปิดเครื่องมือวาดเส้นอิสระ
        });
        map.pm.setGlobalOptions({ 
            layerGroup: drawnItems,
            pathOptions: { color: '#06b6d4', weight: 4, fillColor: '#06b6d4', fillOpacity: 0.3 } // สีวาดเส้นแนวล้ำสมัย
        });

        // ==========================================
        // ระบบซิงค์ข้อมูล Real-time กับ Firebase
        // ==========================================
        let isSyncing = false; // ป้องกันการวนลูปซิงค์ตัวเอง

        // ดึงข้อมูลจาก Firebase ทันทีที่มีการเปลี่ยนแปลง
        onValue(ref(db, 'disaster_layers'), (snapshot) => {
            isSyncing = true;
            const data = snapshot.val() || {};
            
            // ลบข้อมูลที่ไม่มีในฐานข้อมูลแล้วออกไปจากหน้าจอ
            drawnItems.eachLayer(layer => {
                if (!data[layer.options.firebaseId]) drawnItems.removeLayer(layer);
            });

            // อัปเดตหรือเพิ่มข้อมูลใหม่ลงแผนที่
            for (const [id, item] of Object.entries(data)) {
                let existingLayer = null;
                drawnItems.eachLayer(layer => { if (layer.options.firebaseId === id) existingLayer = layer; });

                if (existingLayer) {
                    if (item.type === 'marker') existingLayer.setLatLng([item.lat, item.lng]);
                } else {
                    renderLayerToMap(id, item); // วาดขึ้นมาใหม่ถ้ายังไม่มี
                }
            }
            isSyncing = false;
        });

        // ฟังก์ชันวาดข้อมูลจาก Firebase ลงแผนที่
        function renderLayerToMap(id, item) {
            if (item.type === 'marker') {
                const customIcon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div class="bg-slate-900/90 border border-cyan-400 w-10 h-10 flex items-center justify-center rounded-full text-xl shadow-[0_0_15px_#06b6d4]">${item.emoji}</div>`,
                    iconSize: [40, 40], iconAnchor: [20, 20]
                });
                
                const marker = L.marker([item.lat, item.lng], { icon: customIcon, draggable: true }).addTo(drawnItems);
                marker.options.firebaseId = id;
                marker.options.customType = 'marker';
                marker.bindPopup(`<div class="text-center font-prompt"><p class="font-bold text-cyan-300 text-base mb-2">${item.title}</p><button onclick="window.deleteFirebaseLayer('${id}')" class="text-xs text-red-400 underline hover:text-red-300 transition">ลบทิ้ง</button></div>`);
                
                // เมื่อขยับหมุด ให้อัปเดตขึ้น Firebase
                marker.on('dragend', (e) => {
                    if (!isSyncing) update(ref(db, 'disaster_layers/' + id), { lat: e.target.getLatLng().lat, lng: e.target.getLatLng().lng });
                });
            } else if (item.geojson) {
                const layer = L.geoJSON(item.geojson, {
                    style: { color: item.color || '#06b6d4', weight: 4, fillOpacity: 0.3 }
                });
                layer.eachLayer(l => {
                    l.options.firebaseId = id;
                    l.options.customType = 'drawn';
                    drawnItems.addLayer(l);
                    // เมื่อแก้ไขเส้น/พื้นที่ ให้อัปเดตขึ้น Firebase
                    l.on('pm:edit', (e) => {
                        if (!isSyncing) update(ref(db, 'disaster_layers/' + id), { geojson: e.layer.toGeoJSON() });
                    });
                });
            }
        }

        // ==========================================
        // ฟังก์ชันที่ผูกกับปุ่ม UI หน้าเว็บ (ต้องแนบกับ window)
        // ==========================================

        // ฟังก์ชันสร้างหมุดใหม่
        window.addMarker = function(emoji, title) {
            const center = map.getCenter();
            const id = 'marker_' + Date.now();
            set(ref(db, 'disaster_layers/' + id), {
                type: 'marker', lat: center.lat, lng: center.lng, emoji: emoji, title: title
            });
        };

        // ฟังก์ชันลบข้อมูลออกจาก Firebase
        window.deleteFirebaseLayer = function(id) {
            remove(ref(db, 'disaster_layers/' + id));
        };

        // ฟังก์ชันรายงานพิกัด GPS จากผู้ใช้งานหน้างาน
        window.reportLocation = function() {
            if (navigator.geolocation) {
                // เปลี่ยนปุ่มเป็นสถานะกำลังโหลด
                const btn = event.target;
                const originalText = btn.innerHTML;
                btn.innerHTML = 'กำลังค้นหาสัญญาณดาวเทียม...';

                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const id = 'gps_' + Date.now();
                    
                    set(ref(db, 'disaster_layers/' + id), {
                        type: 'marker', lat: lat, lng: lng, emoji: '📡', title: 'เจ้าหน้าที่ภาคสนาม'
                    });
                    
                    map.flyTo([lat, lng], 15); // ซูมกล้องไปหาตำแหน่งนั้น
                    btn.innerHTML = originalText;
                }, () => {
                    alert('ระบบไม่สามารถเข้าถึง GPS ของคุณได้ กรุณาอนุญาตการเข้าถึง Location');
                    btn.innerHTML = originalText;
                }, { enableHighAccuracy: true });
            } else {
                alert('เบราว์เซอร์ของคุณไม่รองรับระบบ GPS');
            }
        };

        // ==========================================
        // ดักจับ Event ของ Leaflet-Geoman เวลาวาดพื้นที่ใหม่
        // ==========================================
        map.on('pm:create', (e) => {
            const id = 'shape_' + Date.now();
            e.layer.options.firebaseId = id;
            e.layer.options.customType = 'drawn';
            
            // นำรูปทรงที่วาดใหม่ บันทึกขึ้น Firebase
            set(ref(db, 'disaster_layers/' + id), {
                type: 'drawn',
                geojson: e.layer.toGeoJSON(),
                color: e.layer.options.color || '#06b6d4'
            });

            // ดักจับตอนแก้ไขเส้น/พื้นที่
            e.layer.on('pm:edit', (e) => {
                update(ref(db, 'disaster_layers/' + id), { geojson: e.layer.toGeoJSON() });
            });
        });

        // ดักจับเวลาใช้ Geoman ลบข้อมูล
        map.on('pm:remove', (e) => {
             if (e.layer.options.firebaseId) {
                 remove(ref(db, 'disaster_layers/' + e.layer.options.firebaseId));
             }
        });

    </script>
</body>
</html>
