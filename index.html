<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ระบบวางแผนเผชิญเหตุภัยพิบัติ (Pro)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>

    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .toolbar { z-index: 1000; max-height: 90vh; overflow-y: auto; }
        .custom-marker { font-size: 24px; text-align: center; line-height: 24px; filter: drop-shadow(2px 4px 6px black); cursor: pointer;}
    </style>
</head>
<body class="relative">

    <div class="toolbar absolute top-4 left-1/2 transform -translate-x-1/2 bg-white/95 backdrop-blur p-3 rounded-xl shadow-lg w-11/12 md:w-auto flex flex-wrap gap-2 justify-center border border-gray-200">
        <h1 class="w-full text-center text-sm md:text-base font-semibold text-red-700 mb-1">🚨 ศูนย์บัญชาการเหตุการณ์</h1>
        
        <div class="w-full flex justify-center gap-2 flex-wrap mb-1">
            <button onclick="addMarker('👮‍♂️', 'กำลังพล')" class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-sm hover:bg-blue-200">กำลังพล</button>
            <button onclick="addMarker('🚒', 'รถดับเพลิง')" class="px-2 py-1 bg-red-100 text-red-700 rounded text-sm hover:bg-red-200">รถดับเพลิง</button>
            <button onclick="addMarker('🚜', 'เครื่องจักร')" class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-sm hover:bg-yellow-200">เครื่องจักร</button>
        </div>

        <div class="w-full flex justify-center gap-2 flex-wrap mt-2 pt-2 border-t border-gray-200">
            <button onclick="createEvacuationZone()" class="px-3 py-2 bg-purple-600 text-white rounded-lg text-sm shadow hover:bg-purple-700 transition flex-1">
                📍 รัศมีอพยพ 1 กม. (Turf)
            </button>
            <button onclick="clearAllData()" class="px-3 py-2 bg-gray-500 text-white rounded-lg text-sm shadow hover:bg-gray-600 transition flex-1">
                🗑️ ล้างแผนที่
            </button>
        </div>
        <p id="save-status" class="w-full text-center text-xs text-green-600 font-semibold mt-1 hidden">💾 บันทึกข้อมูลอัตโนมัติแล้ว</p>
    </div>

    <div id="map"></div>

    <script>
        // 1. ตั้งค่าแผนที่
        const map = L.map('map', { zoomControl: false }).setView([13.7563, 100.5018], 6);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        // FeatureGroup สำหรับเก็บข้อมูลที่ผู้ใช้วาด/วางหมุด เพื่อง่ายต่อการจัดการ
        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        // 2. ตั้งค่า Geoman ให้อยู่ในกลุ่ม drawnItems
        map.pm.addControls({ position: 'topleft', drawCircle: false, drawCircleMarker: false });
        map.pm.setGlobalOptions({ layerGroup: drawnItems });

        // Event: เมื่อวาดหรือแก้ไขเสร็จ ให้บันทึกข้อมูล
        map.on('pm:create', (e) => {
            e.layer.options.customType = 'drawn'; // ใส่ Tag ว่ามาจากการวาด
            saveDataToLocal();
            // ดักฟังการแก้ไขรูปร่าง
            e.layer.on('pm:edit', saveDataToLocal);
            e.layer.on('pm:dragend', saveDataToLocal);
        });
        map.on('pm:remove', saveDataToLocal);

        // 3. ฟังก์ชันวางหมุด
        function addMarker(emoji, title, latlng = null, isLoad = false) {
            const center = latlng || map.getCenter();
            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: `<div>${emoji}</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            const marker = L.marker(center, { icon: customIcon, draggable: true }).addTo(drawnItems);
            
            // เก็บข้อมูลจำเพาะไว้ใน Object สำหรับเซฟลง LocalStorage
            marker.options.customType = 'marker';
            marker.options.emoji = emoji;
            marker.options.title = title;

            marker.bindPopup(`<div class="font-prompt text-center"><p class="font-semibold">${title}</p>
                <button onclick="drawnItems.removeLayer(${L.stamp(marker)}); saveDataToLocal();" class="mt-2 text-xs text-red-500 underline">ลบลายสัญลักษณ์</button></div>`);

            // Event เมื่อย้ายหมุดให้บันทึก
            marker.on('dragend', saveDataToLocal);

            if(!isLoad) saveDataToLocal();
        }

        // 4. Turf.js: สร้างรัศมีอพยพ 1 กิโลเมตร รอบหมุดทั้งหมด
        function createEvacuationZone() {
            let markerCount = 0;
            drawnItems.eachLayer(layer => {
                // เช็คว่าเป็น หมุด
                if (layer instanceof L.Marker && layer.options.customType === 'marker') {
                    markerCount++;
                    const pt = turf.point([layer.getLatLng().lng, layer.getLatLng().lat]);
                    const buffered = turf.buffer(pt, 1, {units: 'kilometers'}); // รัศมี 1 กม.
                    
                    // แปลงกลับเป็น Leaflet Layer
                    const bufferLayer = L.geoJSON(buffered, {
                        style: { color: '#ff0000', fillColor: '#ff0000', fillOpacity: 0.2, dashArray: '5,5', weight: 2 }
                    });

                    // นำเข้ากลุ่ม drawnItems เพื่อให้ Geoman ลบ/แก้ไขได้
                    bufferLayer.eachLayer(l => {
                        l.options.customType = 'drawn';
                        drawnItems.addLayer(l);
                        l.on('pm:edit', saveDataToLocal);
                    });
                }
            });

            if(markerCount === 0) alert('กรุณาวางหมุด (เช่น รถดับเพลิง หรือกำลังพล) บนแผนที่ก่อนสร้างรัศมีครับ');
            else saveDataToLocal();
        }

        // 5. ระบบ Local Storage
        function saveDataToLocal() {
            const data = [];
            drawnItems.eachLayer(layer => {
                let itemData = { type: layer.options.customType };
                
                if (layer instanceof L.Marker && layer.options.customType === 'marker') {
                    itemData.latlng = layer.getLatLng();
                    itemData.emoji = layer.options.emoji;
                    itemData.title = layer.options.title;
                } else if (layer.toGeoJSON) {
                    itemData.geojson = layer.toGeoJSON();
                }
                data.push(itemData);
            });
            localStorage.setItem('disaster_map_data', JSON.stringify(data));
            
            // แสดงสถานะว่าเซฟแล้ว
            const status = document.getElementById('save-status');
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 2000);
        }

        function loadDataFromLocal() {
            const dataStr = localStorage.getItem('disaster_map_data');
            if (!dataStr) return;
            
            const data = JSON.parse(dataStr);
            data.forEach(item => {
                if (item.type === 'marker') {
                    addMarker(item.emoji, item.title, item.latlng, true);
                } else if (item.geojson) {
                    const layer = L.geoJSON(item.geojson, {
                        style: function(feature) { return item.geojson.properties.style || { color: '#3388ff' }; }
                    });
                    layer.eachLayer(l => {
                        l.options.customType = 'drawn';
                        drawnItems.addLayer(l);
                        l.on('pm:edit', saveDataToLocal);
                        l.on('pm:dragend', saveDataToLocal);
                    });
                }
            });
        }

        function clearAllData() {
            if(confirm('คุณแน่ใจหรือไม่ว่าต้องการล้างข้อมูลแผนงานทั้งหมดบนแผนที่?')) {
                drawnItems.clearLayers();
                localStorage.removeItem('disaster_map_data');
            }
        }

        // โหลดข้อมูลเก่าทันทีเมื่อเปิดหน้าเว็บ
        window.onload = loadDataFromLocal;

    </script>
</body>
</html>
