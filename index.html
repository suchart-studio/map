<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Disaster Command Center (Khon Kaen)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; margin: 0; padding: 0; background-color: #0f172a; color: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* สไตล์ High-Tech Dashboard */
        .toolbar { 
            z-index: 1000; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
            border: 1px solid #06b6d4; box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }
        
        .custom-marker { filter: drop-shadow(0 0 10px #06b6d4); cursor: pointer; }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background-color: #1e293b !important; color: #22d3ee !important;
            border: 1px solid #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
        }
        .leaflet-container .leaflet-control-layers {
            background: rgba(15, 23, 42, 0.9); border: 1px solid #06b6d4; color: #fff;
        }
        
        .btn-neon {
            background: rgba(6, 182, 212, 0.1); border: 1px solid #06b6d4; color: #22d3ee; transition: all 0.3s;
        }
        .btn-neon:hover { background: #06b6d4; color: #0f172a; box-shadow: 0 0 15px #06b6d4; }
    </style>
</head>
<body class="relative">

    <div id="realtime-clock" class="absolute top-4 right-4 bg-slate-900/80 border border-cyan-500/50 text-cyan-300 px-3 py-1.5 rounded-lg shadow-[0_0_10px_rgba(6,182,212,0.3)] z-[1000] font-mono text-sm md:text-base backdrop-blur-sm pointer-events-none">
        --/--/---- --:--:--
    </div>

    <div class="toolbar absolute top-4 left-1/2 transform -translate-x-1/2 p-4 rounded-xl w-[90%] max-w-[400px] flex flex-col gap-3 justify-center">
        <div class="flex items-center justify-between w-full border-b border-cyan-500/50 pb-2">
            <h1 class="text-sm md:text-base font-semibold text-cyan-400 tracking-wider">🌐 COMMAND CENTER <span class="text-xs text-green-400 animate-pulse">● ONLINE</span></h1>
        </div>
        
        <div class="w-full flex justify-center gap-2 flex-wrap">
            <button onclick="window.addMarker('👮‍♂️', 'กำลังพล')" class="btn-neon px-2 py-1.5 rounded text-sm flex-1">👮‍♂️ กำลังพล</button>
            <button onclick="window.addMarker('🚒', 'รถดับเพลิง')" class="btn-neon px-2 py-1.5 rounded text-sm flex-1">🚒 ดับเพลิง</button>
            <button onclick="window.addMarker('🚜', 'เครื่องจักร')" class="btn-neon px-2 py-1.5 rounded text-sm flex-1">🚜 เครื่องจักร</button>
            <button onclick="window.addMarker('☣️', 'จุดอันตราย')" class="btn-neon px-2 py-1.5 rounded text-sm flex-1">☣️ พื้นที่เสี่ยง</button>
        </div>

        <div class="w-full mt-1">
            <button onclick="window.reportLocation()" class="w-full px-3 py-2 bg-green-600/20 border border-green-500 text-green-400 rounded-lg text-sm shadow-[0_0_10px_rgba(34,197,94,0.3)] hover:bg-green-500 hover:text-white transition">
                📡 รายงานพิกัดภาคสนาม (GPS) + ข้อความ
            </button>
        </div>

        <div class="w-full mt-1 pt-2 border-t border-cyan-500/30 flex justify-center">
            <button onclick="window.resetAllData()" class="w-full px-3 py-1.5 bg-red-600/20 border border-red-500 text-red-400 rounded-lg text-xs shadow-[0_0_10px_rgba(239,68,68,0.3)] hover:bg-red-500 hover:text-white transition">
                ⚠️ ล้างข้อมูลแผนที่ทั้งหมด (Reset)
            </button>
        </div>
    </div>

    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ-E8bN9nz_BWKTNofz7ccuVoo6m8LyAU",
            authDomain: "suchart-915bd.firebaseapp.com",
            databaseURL: "https://suchart-915bd-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchart-915bd",
            storageBucket: "suchart-915bd.firebasestorage.app",
            messagingSenderId: "94380768305",
            appId: "1:94380768305:web:974c9b41513cc9d261a910"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // นาฬิกา Real-time
        setInterval(() => {
            const now = new Date();
            document.getElementById('realtime-clock').innerText = now.toLocaleString('th-TH', { 
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }, 1000);

        // ตั้งค่าแผนที่: ศูนย์กลางขอนแก่น + ระบบหมุนแผนที่
        const map = L.map('map', { 
            zoomControl: false,
            boxZoom: false,        // ปิด Box Zoom เพื่อให้ใช้ Shift หมุนแผนที่ได้
            rotate: true,
            touchRotate: true,
            rotateControl: { position: 'bottomright', closeOnZeroBearing: false },
            bearing: 0 
        }).setView([16.4322, 102.8236], 13);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // ชั้นข้อมูลแผนที่ (ภาพถ่ายดาวเทียมเป็นค่าเริ่มต้น)
        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map); 
        const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });

        // สร้าง Group
        const markersGroup = L.featureGroup().addTo(map);
        const shapesGroup = L.featureGroup().addTo(map);
        const gpsReportsGroup = L.featureGroup().addTo(map);

        const baseMaps = {
            "ภาพถ่ายดาวเทียม (Satellite)": satelliteLayer,
            "แผนที่ยุทธการ (Dark)": darkLayer,
            "แผนที่ถนน (OSM)": streetLayer
        };

        const overlayMaps = {
            "📌 หมุดทรัพยากร": markersGroup,
            "✍️ เส้นและพื้นที่ที่วาด": shapesGroup,
            "📡 รายงานภาคสนาม": gpsReportsGroup
        };

        L.control.layers(baseMaps, overlayMaps, { position: 'bottomleft', collapsed: false }).addTo(map);

        // Geoman จะวาดลงในกลุ่ม shapesGroup
        map.pm.addControls({ 
            position: 'topleft', 
            drawCircle: false, 
            drawCircleMarker: false, 
            drawText: true 
        });
        map.pm.setGlobalOptions({ layerGroup: shapesGroup, pathOptions: { color: '#06b6d4', weight: 4 } });

        // ================= Firebase Sync =================
        let isSyncing = false;

        onValue(ref(db, 'disaster_layers'), (snapshot) => {
            isSyncing = true;
            const data = snapshot.val() || {};
            
            // ลบของที่ไม่มีใน DB
            [markersGroup, shapesGroup, gpsReportsGroup].forEach(group => {
                group.eachLayer(layer => {
                    if (!data[layer.options.firebaseId]) group.removeLayer(layer);
                });
            });

            // อัปเดต/เพิ่มของใหม่
            for (const [id, item] of Object.entries(data)) {
                let existingLayer = null;
                [markersGroup, shapesGroup, gpsReportsGroup].forEach(group => {
                    group.eachLayer(layer => { if (layer.options.firebaseId === id) existingLayer = layer; });
                });

                if (existingLayer) {
                    if (item.type === 'marker' || item.type === 'gps') existingLayer.setLatLng([item.lat, item.lng]);
                } else {
                    renderLayerToMap(id, item);
                }
            }
            isSyncing = false;
        });

        function renderLayerToMap(id, item) {
            if (item.type === 'marker' || item.type === 'gps') {
                const isGPS = item.type === 'gps';
                const borderColor = isGPS ? '#22c55e' : '#06b6d4'; 
                const shadowColor = isGPS ? '#22c55e' : '#06b6d4';

                const customIcon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div class="bg-slate-900/90 border-2 w-10 h-10 flex items-center justify-center rounded-full text-xl shadow-[0_0_15px_${shadowColor}]" style="border-color: ${borderColor}">${item.emoji}</div>`,
                    iconSize: [40, 40], iconAnchor: [20, 20]
                });
                
                const targetGroup = isGPS ? gpsReportsGroup : markersGroup;
                const marker = L.marker([item.lat, item.lng], { icon: customIcon, draggable: !isGPS }).addTo(targetGroup);
                marker.options.firebaseId = id;
                marker.options.customType = item.type;
                
                let popupHTML = '';
                if (isGPS) {
                    popupHTML = `<div class="text-center font-prompt"><p class="font-bold text-green-400 text-base mb-1">${item.title}</p>
                        <p class="text-sm text-gray-200 bg-slate-800 p-2 rounded-lg border border-slate-600 mb-1">💬 ${item.message}</p>
                        <p class="text-xs text-gray-400 mb-2">🕒 ${item.timestamp}</p>
                        <button onclick="window.deleteFirebaseLayer('${id}')" class="text-xs text-red-400 underline mt-1">ปิดรับรายงาน (ลบ)</button></div>`;
                } else {
                    popupHTML = `<div class="text-center font-prompt"><p class="font-bold text-cyan-300 text-base mb-2">${item.title}</p>
                        <button onclick="window.deleteFirebaseLayer('${id}')" class="text-xs text-red-400 underline">ลบทิ้ง</button></div>`;
                }
                marker.bindPopup(popupHTML);
                
                marker.on('dragend', (e) => {
                    if (!isSyncing) update(ref(db, 'disaster_layers/' + id), { lat: e.target.getLatLng().lat, lng: e.target.getLatLng().lng });
                });
            } else if (item.geojson) {
                const layerGroup = L.geoJSON(item.geojson, { 
                    style: { color: item.color || '#06b6d4', weight: 4, fillOpacity: 0.3 },
                    pointToLayer: function(feature, latlng) {
                        if (item.shape === 'Text' && item.text) {
                            return L.marker(latlng, { textMarker: true, text: item.text });
                        }
                        return L.circleMarker(latlng);
                    }
                });

                layerGroup.eachLayer(l => {
                    l.options.firebaseId = id; l.options.customType = 'drawn';
                    shapesGroup.addLayer(l);
                    l.on('pm:edit', (e) => { 
                        if (!isSyncing) {
                            let updatedText = item.text;
                            const targetLayer = e.target;
                            if (targetLayer.pm && targetLayer.pm.getShape() === 'Text') {
                                updatedText = targetLayer.getElement()?.innerText || targetLayer.options.text;
                            }
                            update(ref(db, 'disaster_layers/' + id), { geojson: targetLayer.toGeoJSON(), text: updatedText }); 
                        }
                    });
                });
            }
        }

        // ================= UI Functions =================
        window.addMarker = function(emoji, defaultTitle) {
            const customTitle = prompt("กำหนดชื่อหมุด (เช่น หน่วยกู้ภัยที่ 1):", defaultTitle);
            if (!customTitle) return; 

            const center = map.getCenter();
            const id = 'marker_' + Date.now();
            set(ref(db, 'disaster_layers/' + id), { type: 'marker', lat: center.lat, lng: center.lng, emoji: emoji, title: customTitle });
        };

        window.deleteFirebaseLayer = function(id) {
            remove(ref(db, 'disaster_layers/' + id));
        };

        // ฟังก์ชัน Reset ล้างข้อมูลทั้งหมด
        window.resetAllData = function() {
            const pwd = prompt("⚠️ คำเตือน: ระบบจะทำการล้างข้อมูลทั้งหมดบนแผนที่\n\nกรุณาป้อนรหัสผ่านเพื่อยืนยัน:");
            
            if (pwd === "878556") {
                if (confirm("คุณแน่ใจหรือไม่? การกระทำนี้ไม่สามารถย้อนกลับได้ ข้อมูลจะหายไปจากทุกหน้าจอทันที")) {
                    // สั่งลบข้อมูลที่ node 'disaster_layers' ทิ้งทั้งก้อน
                    remove(ref(db, 'disaster_layers'))
                        .then(() => alert("✅ ล้างข้อมูลแผนที่เรียบร้อยแล้ว"))
                        .catch((err) => alert("❌ เกิดข้อผิดพลาดในการลบข้อมูล: " + err.message));
                }
            } else if (pwd !== null) {
                alert("❌ รหัสผ่านไม่ถูกต้อง");
            }
        };

        window.reportLocation = function() {
            const msg = prompt("ระบุข้อความ/สถานการณ์ที่ต้องการรายงาน (เช่น ระดับน้ำท่วม, ไฟไหม้ลุกลาม):");
            if (msg === null) return; 

            if (navigator.geolocation) {
                const btn = event.target;
                const originalText = btn.innerHTML;
                btn.innerHTML = 'กำลังดึงพิกัดดาวเทียม...';

                navigator.geolocation.getCurrentPosition(position => {
                    const id = 'gps_' + Date.now();
                    const nowStr = new Date().toLocaleString('th-TH', { 
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                    
                    set(ref(db, 'disaster_layers/' + id), {
                        type: 'gps', lat: position.coords.latitude, lng: position.coords.longitude, 
                        emoji: '📡', title: 'เจ้าหน้าที่ภาคสนาม',
                        message: msg, timestamp: nowStr 
                    });
                    
                    map.flyTo([position.coords.latitude, position.coords.longitude], 16);
                    btn.innerHTML = originalText;
                }, () => {
                    alert('ระบบไม่สามารถเข้าถึง GPS ของคุณได้');
                    btn.innerHTML = originalText;
                }, { enableHighAccuracy: true });
            }
        };

        // ================= Geoman Events =================
        map.on('pm:create', (e) => {
            const id = 'shape_' + Date.now();
            e.layer.options.firebaseId = id;
            
            let textVal = null;
            if (e.shape === 'Text') {
                textVal = e.layer.options.text; 
            }

            set(ref(db, 'disaster_layers/' + id), { 
                type: 'drawn', 
                shape: e.shape,
                geojson: e.layer.toGeoJSON(), 
                color: e.layer.options.color || '#06b6d4',
                text: textVal
            });
            
            e.layer.on('pm:edit', (evt) => { 
                let updatedText = textVal;
                const targetLayer = evt.target;
                if (targetLayer.pm && targetLayer.pm.getShape() === 'Text') {
                    updatedText = targetLayer.getElement()?.innerText || targetLayer.options.text;
                }
                update(ref(db, 'disaster_layers/' + id), { geojson: targetLayer.toGeoJSON(), text: updatedText }); 
            });
        });
        
        map.on('pm:remove', (e) => { 
            if (e.layer.options.firebaseId) remove(ref(db, 'disaster_layers/' + e.layer.options.firebaseId)); 
        });

    </script>
</body>
</html>
